<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Elliot's Pets</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Elliot's Pets">
<style>
  :root {
    --bg1: #ffe9c7;
    --bg2: #ffd1dc;
    --accent: #ff8fab;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    background: linear-gradient(160deg, var(--bg1), var(--bg2));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .clouds { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .cloud {
    position: absolute; font-size: 48px; opacity: 0.5;
    animation: drift 40s linear infinite;
  }
  @keyframes drift {
    from { transform: translateX(-10vw); }
    to { transform: translateX(110vw); }
  }

  .stage {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .pet-tabs {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
    z-index: 1;
  }
  .pet-tab {
    border: none;
    border-radius: 22px;
    padding: 8px 16px;
    font-size: clamp(15px, 4vw, 18px);
    font-weight: 700;
    background: rgba(255,255,255,0.55);
    color: #6b4226;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
  }
  .pet-tab .emoji { font-size: 1.3em; }
  .pet-tab.active {
    background: white;
    box-shadow: 0 3px 0 rgba(0,0,0,0.12), 0 0 0 3px var(--accent);
  }

  .pet-name {
    font-size: clamp(24px, 6vw, 36px);
    font-weight: 800;
    color: #6b4226;
    margin-bottom: 8px;
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
  }

  .pet-house {
    width: min(70vw, 320px);
    height: min(70vw, 320px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fffaf0, #ffe2c4 70%);
    box-shadow: 0 10px 0 rgba(0,0,0,0.08), inset 0 -10px 20px rgba(255,160,120,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .pet {
    font-size: clamp(80px, 22vw, 160px);
    line-height: 1;
    transform-origin: bottom center;
    animation: bob 2.2s ease-in-out infinite;
    filter: drop-shadow(0 8px 6px rgba(0,0,0,0.12));
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-10px) scale(1.03); }
  }
  .pet.bounce { animation: bounce 0.6s ease; }
  @keyframes bounce {
    0% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-40px) scale(1.1); }
    55% { transform: translateY(0) scale(0.95); }
    75% { transform: translateY(-15px) scale(1.05); }
    100% { transform: translateY(0) scale(1); }
  }
  .pet.sleeping { animation: sleepbob 3s ease-in-out infinite; }
  @keyframes sleepbob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-4px) rotate(-3deg); }
  }

  .floaters {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .floater {
    position: absolute;
    font-size: 40px;
    left: 50%;
    top: 40%;
    transform: translate(-50%, -50%);
    animation: floatUp 1.1s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
    20% { transform: translate(-50%, -90%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -180%) scale(1); }
  }

  .hearts-row {
    display: flex;
    gap: 6px;
    margin-top: 18px;
    height: 28px;
  }
  .heart {
    font-size: 24px;
    transition: transform 0.3s ease;
  }
  .heart.pop { animation: pop 0.4s ease; }
  @keyframes pop {
    0% { transform: scale(0.4); }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .controls {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 4vw;
    padding: 14px 4vw calc(20px + env(safe-area-inset-bottom));
    z-index: 1;
  }
  .btn {
    flex: 1;
    max-width: 140px;
    aspect-ratio: 1;
    border: none;
    border-radius: 32px;
    background: var(--accent);
    color: white;
    font-size: clamp(36px, 9vw, 56px);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 0 #d96080, 0 12px 18px rgba(0,0,0,0.15);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .btn:active {
    transform: translateY(8px);
    box-shadow: 0 0 0 #d96080, 0 4px 10px rgba(0,0,0,0.15);
  }
  .btn.feed { background: #ffb347; box-shadow: 0 8px 0 #d98f2a, 0 12px 18px rgba(0,0,0,0.15); }
  .btn.feed:active { box-shadow: 0 0 0 #d98f2a, 0 4px 10px rgba(0,0,0,0.15); }
  .btn.play { background: #6fcf97; box-shadow: 0 8px 0 #4ba374, 0 12px 18px rgba(0,0,0,0.15); }
  .btn.play:active { box-shadow: 0 0 0 #4ba374, 0 4px 10px rgba(0,0,0,0.15); }
  .btn.sleep { background: #9b8cf2; box-shadow: 0 8px 0 #7466c9, 0 12px 18px rgba(0,0,0,0.15); }
  .btn.sleep:active { box-shadow: 0 0 0 #7466c9, 0 4px 10px rgba(0,0,0,0.15); }

  .sparkle {
    position: absolute;
    font-size: 28px;
    pointer-events: none;
    animation: sparkleFade 1s ease-out forwards;
  }
  @keyframes sparkleFade {
    0% { opacity: 1; transform: scale(0.5) translateY(0); }
    100% { opacity: 0; transform: scale(1.4) translateY(-60px); }
  }

  .zzz {
    position: absolute;
    top: 6%;
    right: 14%;
    font-size: 30px;
    opacity: 0;
  }
  .zzz.show {
    animation: zfloat 2.4s ease-in-out infinite;
  }
  @keyframes zfloat {
    0% { opacity: 0; transform: translateY(0) scale(0.6); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
  }
</style>
</head>
<body>

<div class="clouds">
  <div class="cloud" style="top: 8%; animation-delay: 0s;">☁️</div>
  <div class="cloud" style="top: 18%; animation-delay: -15s;">☁️</div>
  <div class="cloud" style="top: 4%; animation-delay: -28s;">☁️</div>
</div>

<div class="stage">
  <div class="pet-tabs">
    <button class="pet-tab" id="tabKoala"><span class="emoji">🐨</span>Koala</button>
    <button class="pet-tab" id="tabRabbit"><span class="emoji">🐰</span>Flappie</button>
  </div>
  <div class="pet-name" id="petName">Koala</div>
  <div class="pet-house">
    <div class="zzz" id="zzz">💤</div>
    <div class="pet" id="pet">🥚</div>
    <div class="floaters" id="floaters"></div>
  </div>
  <div class="hearts-row" id="hearts"></div>
</div>

<div class="controls">
  <button class="btn feed" id="feedBtn" aria-label="Feed">🍎</button>
  <button class="btn play" id="playBtn" aria-label="Play">⚽️</button>
  <button class="btn sleep" id="sleepBtn" aria-label="Sleep">🌙</button>
</div>

<script>
(function () {
  const PETS = {
    koala: {
      name: "Koala",
      storageKey: "elliot-pet-koala-v1",
      moods: { egg: "🥚", baby: "🐨", happy: "🐨", veryHappy: "🐨", sleeping: "😴" },
    },
    rabbit: {
      name: "Flappie",
      storageKey: "elliot-pet-rabbit-v1",
      moods: { egg: "🥚", baby: "🐰", happy: "🐰", veryHappy: "🐰", sleeping: "😴" },
    },
  };

  let activePetId = localStorage.getItem("elliot-active-pet") || "koala";
  let state = load();

  const petEl = document.getElementById("pet");
  const petNameEl = document.getElementById("petName");
  const heartsEl = document.getElementById("hearts");
  const floatersEl = document.getElementById("floaters");
  const zzzEl = document.getElementById("zzz");
  const feedBtn = document.getElementById("feedBtn");
  const playBtn = document.getElementById("playBtn");
  const sleepBtn = document.getElementById("sleepBtn");
  const tabKoala = document.getElementById("tabKoala");
  const tabRabbit = document.getElementById("tabRabbit");

  function activePet() {
    return PETS[activePetId];
  }

  function load() {
    try {
      const raw = localStorage.getItem(PETS[activePetId].storageKey);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { love: 1, hatched: false, sleeping: false, feeds: 0, plays: 0 };
  }

  function save() {
    localStorage.setItem(PETS[activePetId].storageKey, JSON.stringify(state));
    localStorage.setItem("elliot-active-pet", activePetId);
  }

  function currentEmoji() {
    const moods = activePet().moods;
    if (state.sleeping) return moods.sleeping;
    if (!state.hatched) return moods.egg;
    if (state.love >= 8) return moods.veryHappy;
    if (state.love >= 4) return moods.happy;
    return moods.baby;
  }

  function switchPet(petId) {
    if (petId === activePetId) return;
    activePetId = petId;
    state = load();
    tabKoala.classList.toggle("active", petId === "koala");
    tabRabbit.classList.toggle("active", petId === "rabbit");
    petNameEl.textContent = activePet().name;
    render();
  }

  tabKoala.addEventListener("click", () => switchPet("koala"));
  tabRabbit.addEventListener("click", () => switchPet("rabbit"));

  function renderHearts() {
    heartsEl.innerHTML = "";
    const count = Math.min(5, Math.max(1, Math.ceil(state.love / 2)));
    for (let i = 0; i < count; i++) {
      const h = document.createElement("span");
      h.className = "heart";
      h.textContent = "💗";
      heartsEl.appendChild(h);
    }
  }

  function render() {
    petEl.textContent = currentEmoji();
    petEl.classList.toggle("sleeping", state.sleeping);
    zzzEl.classList.toggle("show", state.sleeping);
    renderHearts();
  }

  function bounce() {
    petEl.classList.remove("bounce");
    void petEl.offsetWidth;
    petEl.classList.add("bounce");
  }

  function popHearts() {
    [...heartsEl.children].forEach((h, i) => {
      setTimeout(() => {
        h.classList.remove("pop");
        void h.offsetWidth;
        h.classList.add("pop");
      }, i * 60);
    });
  }

  function floatEmoji(emoji) {
    const f = document.createElement("div");
    f.className = "floater";
    f.textContent = emoji;
    f.style.left = (45 + Math.random() * 10) + "%";
    floatersEl.appendChild(f);
    setTimeout(() => f.remove(), 1100);
  }

  function sparkleBurst() {
    const house = document.querySelector(".pet-house");
    const symbols = ["✨", "⭐️", "🌟"];
    for (let i = 0; i < 6; i++) {
      const s = document.createElement("div");
      s.className = "sparkle";
      s.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      const angle = (Math.PI * 2 * i) / 6;
      const radius = 90;
      s.style.left = `calc(50% + ${Math.cos(angle) * radius}px)`;
      s.style.top = `calc(50% + ${Math.sin(angle) * radius}px)`;
      house.appendChild(s);
      setTimeout(() => s.remove(), 1000);
    }
  }

  function vibrate() {
    if (navigator.vibrate) navigator.vibrate(15);
  }

  function gainLove(amount) {
    state.love = Math.min(10, state.love + amount);
    if (!state.hatched && state.love >= 2) {
      state.hatched = true;
    }
  }

  feedBtn.addEventListener("click", () => {
    if (state.sleeping) return;
    vibrate();
    state.feeds++;
    gainLove(1);
    bounce();
    sparkleBurst();
    floatEmoji("🍎");
    save();
    render();
  });

  playBtn.addEventListener("click", () => {
    if (state.sleeping) return;
    vibrate();
    state.plays++;
    gainLove(1);
    bounce();
    sparkleBurst();
    floatEmoji("⚽️");
    popHearts();
    save();
    render();
  });

  sleepBtn.addEventListener("click", () => {
    vibrate();
    state.sleeping = !state.sleeping;
    save();
    render();
  });

  tabKoala.classList.toggle("active", activePetId === "koala");
  tabRabbit.classList.toggle("active", activePetId === "rabbit");
  petNameEl.textContent = activePet().name;
  render();
})();
</script>
</body>
</html>
